<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="diagonalLines" patternUnits="userSpaceOnUse" width="40" height="40" patternTransform="rotate(320)">
      <line x1="0" y1="0" x2="0" y2="40" stroke="rgba(255,255,255,0.15)" stroke-width="2" />
      <line x1="20" y1="0" x2="20" y2="40" stroke="rgba(255,255,255,0.15)" stroke-width="2" />
    </pattern>
  </defs>
  <rect width="100%" height="100%" fill="url(#diagonalLines)" />
</svg> 